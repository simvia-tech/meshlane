name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure the tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not point to a commit on main; aborting release."
            exit 1
          fi

      - name: Ensure the tag matches the version in pyproject.toml
        run: |
          PROJECT_VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          if [ "$PROJECT_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${PROJECT_VERSION}."
            exit 1
          fi

      - name: Extract the changelog section for this version
        run: |
          awk -v ver="$GITHUB_REF_NAME" '
            $0 ~ "^## meshlane " ver { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md | sed '/./,$!d' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md \
            dist/*
