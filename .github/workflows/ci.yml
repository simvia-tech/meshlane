name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository (with LFS)
        uses: nschloe/action-cached-lfs-checkout@v1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
          pip install -e ".[all]"

      - name: Run tests
        run: tox -- --cov meshlane --cov-report xml --cov-report term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: ${{ matrix.python-version == '3.12' }}

      - name: Build distributable artifacts
        run: |
          pip install build
          python -m build

      - name: Verify the wheel installs in a clean environment
        run: |
          python -m venv /tmp/install_test
          /tmp/install_test/bin/pip install dist/meshlane-*.whl
          /tmp/install_test/bin/meshlane --help
